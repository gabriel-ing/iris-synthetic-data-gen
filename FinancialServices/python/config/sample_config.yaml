seed: 42
currency: "USD"

time:
  start_date: "2026-01-01"
  days: 90
  timezone: "UTC"

scale:
  mode: "explicit"
  factor: 1
  base_counts:
    customers: 100000
    merchants: 50000
    cards: 150000
    transactions: 1000000
    disputes: 20000
  counts:
    customers: 100000
    merchants: 50000
    cards: 150000
    transactions: 1000000
    disputes: 20000

output:
  format: "csv"
  path: "./out"
  partition_transactions_by: "none"
  overwrite: true

behavior:
  segments:
    - name: "STUDENT"
      weight: 0.15
      txn_rate_multiplier: 0.8
      avg_amount_multiplier: 0.7
      ecom_multiplier: 1.4
      decline_multiplier: 1.0
      dispute_multiplier: 1.1
    - name: "MASS"
      weight: 0.50
      txn_rate_multiplier: 1.0
      avg_amount_multiplier: 1.0
      ecom_multiplier: 1.0
      decline_multiplier: 1.0
      dispute_multiplier: 1.0
    - name: "AFFLUENT"
      weight: 0.15
      txn_rate_multiplier: 1.2
      avg_amount_multiplier: 1.6
      ecom_multiplier: 0.9
      decline_multiplier: 0.8
      dispute_multiplier: 0.9
    - name: "HIGHRISK"
      weight: 0.10
      txn_rate_multiplier: 1.0
      avg_amount_multiplier: 1.0
      ecom_multiplier: 1.4
      decline_multiplier: 1.6
      dispute_multiplier: 1.8
    - name: "DORMANT"
      weight: 0.10
      txn_rate_multiplier: 0.1
      avg_amount_multiplier: 0.8
      ecom_multiplier: 1.0
      decline_multiplier: 1.0
      dispute_multiplier: 1.0

  merchants:
    category_weights:
      GROCERY: 0.22
      FUEL: 0.10
      DINING: 0.18
      TRAVEL: 0.08
      RETAIL: 0.30
      DIGITAL: 0.12
    risk_tier_weights:
      LOW: 0.80
      MED: 0.15
      HIGH: 0.05
    popularity_pareto_alpha: 2.0

  transactions:
    base_decline_rate: 0.08
    base_refund_rate: 0.02
    base_ecom_share: 0.20
    weekly_seasonality: true

  disputes:
    target_count: 200
    base_rate: 0.02
    ecom_multiplier: 2.0
    highrisk_customer_multiplier: 2.0
    highrisk_merchant_multiplier: 2.5
    reason_weights:
      FRAUD: 0.40
      NOT_RECEIVED: 0.25
      DUPLICATE: 0.10
      NOT_AS_DESCRIBED: 0.20
      CANCELLED: 0.05
    outcome_weights:
      CUSTOMER_WON: 0.55
      MERCHANT_WON: 0.30
      WITHDRAWN: 0.10
      CHARGEBACK: 0.05

edge_cases:
  enable: true
  customers_with_no_cards: 10
  cards_with_only_declines: 10
  blocked_cards_mid_window: 20
  fraud_bursts:
    count_cards: 8
    txns_per_card: 20
    burst_hours: 2
    amount_range: [1.0, 25.0]
